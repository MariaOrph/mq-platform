<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MQ — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0A2E2A; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
    .container { max-width: 360px; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { font-size: 14px; color: rgba(185,248,221,0.7); line-height: 1.6; }
    .icon { font-size: 48px; margin-bottom: 24px; }
    button { margin-top: 24px; padding: 12px 28px; background: #0AF3CD; color: #0A2E2A; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>MQ needs an internet connection for coaching and real-time insights. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
